<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawFlow 🐙 - Workflow Orchestrator</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2em;
            color: #00d9ff;
        }
        
        h1 span {
            font-size: 1.2em;
        }
        
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        
        .status-online {
            background: #00c853;
            color: #000;
        }
        
        .status-offline {
            background: #ff5252;
            color: #fff;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .card h2 {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #00d9ff;
        }
        
        .agent-list {
            list-style: none;
        }
        
        .agent-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .agent-item:last-child {
            border-bottom: none;
        }
        
        .agent-name {
            font-weight: 500;
        }
        
        .agent-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00c853;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .template-card {
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        
        .template-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .template-name {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .template-desc {
            font-size: 0.9em;
            color: #aaa;
        }
        
        .run-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #e0e0e0;
            font-family: inherit;
            resize: vertical;
        }
        
        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: #00d9ff;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #00b8d4;
        }
        
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        
        .log-output {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-line {
            margin-bottom: 5px;
        }
        
        .log-info { color: #00d9ff; }
        .log-success { color: #00c853; }
        .log-error { color: #ff5252; }
        .log-warning { color: #ffc107; }
        
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .metric {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }
        
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #00d9ff;
        }
        
        .metric-label {
            font-size: 0.85em;
            color: #aaa;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ClawFlow 🐙 <span>Workflow Orchestrator</span></h1>
            <div id="statusBadge" class="status-badge status-offline">Connecting...</div>
        </header>
        
        <div class="grid">
            <!-- System Status -->
            <div class="card">
                <h2>📊 System Status</h2>
                <div id="metrics" class="metrics">
                    <div class="metric">
                        <div class="metric-value" id="agentCount">-</div>
                        <div class="metric-label">Active Agents</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="queueSize">-</div>
                        <div class="metric-label">Pending Messages</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="serviceStatus">-</div>
                        <div class="metric-label">Service</div>
                    </div>
                </div>
            </div>
            
            <!-- Agents -->
            <div class="card">
                <h2>🤖 Active Agents</h2>
                <ul id="agentList" class="agent-list">
                    <li class="agent-item">
                        <span class="agent-name">Loading...</span>
                    </li>
                </ul>
            </div>
        </div>
        
        <div class="grid">
            <!-- Run Workflow -->
            <div class="card">
                <h2>🚀 Run Workflow</h2>
                <div class="run-form">
                    <textarea id="workflowInput" placeholder="Describe your task... e.g., 'Create a quantitative trading strategy with moving average crossover'"></textarea>
                    <button id="runBtn" onclick="runWorkflow()">Run Workflow</button>
                </div>
            </div>
            
            <!-- Execution Log -->
            <div class="card">
                <h2>📝 Execution Log</h2>
                <div id="logOutput" class="log-output">
                    <div class="log-line log-info">Waiting for workflow execution...</div>
                </div>
            </div>
        </div>
        
        <!-- Template Marketplace -->
        <div class="card" style="margin-bottom: 30px;">
            <h2>📦 Template Marketplace</h2>
            <div id="templateList" class="grid" style="margin-top: 15px;">
                <div class="card template-card">
                    <div class="template-name">Loading templates...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // WebSocket connection
        const socket = io();
        
        socket.on('connect', () => {
            console.log('Connected to server');
            updateStatus(true);
        });
        
        socket.on('disconnect', () => {
            console.log('Disconnected from server');
            updateStatus(false);
        });
        
        socket.on('agent_update', (data) => {
            console.log('Agent update:', data);
            addLog(`Agent ${data.agent_id} updated: ${JSON.stringify(data.status)}`, 'info');
        });
        
        function updateStatus(online) {
            const badge = document.getElementById('statusBadge');
            if (online) {
                badge.className = 'status-badge status-online';
                badge.textContent = 'Online';
            } else {
                badge.className = 'status-badge status-offline';
                badge.textContent = 'Offline';
            }
        }
        
        async function fetchStatus() {
            try {
                const resp = await fetch('/api/status');
                const data = await resp.json();
                
                document.getElementById('agentCount').textContent = data.agents ? data.agents.length : 0;
                document.getElementById('queueSize').textContent = data.message_bus_stats ? Object.values(data.message_bus_stats.queue_sizes || {}).reduce((a, b) => a + b, 0) : 0;
                document.getElementById('serviceStatus').textContent = data.status === 'running' ? '✓' : '✗';
                
                // Update agent list
                const agentList = document.getElementById('agentList');
                if (data.agents) {
                    agentList.innerHTML = data.agents.map(agent => `
                        <li class="agent-item">
                            <span class="agent-name">${agent}</span>
                            <span class="agent-status"></span>
                        </li>
                    `).join('');
                }
            } catch (err) {
                console.error('Failed to fetch status:', err);
            }
        }
        
        async function fetchTemplates() {
            try {
                const resp = await fetch('/api/templates');
                const templates = await resp.json();
                
                const templateList = document.getElementById('templateList');
                templateList.innerHTML = templates.map(t => `
                    <div class="card template-card" onclick="useTemplate('${t.id}')">
                        <div class="template-name">${t.name}</div>
                        <div class="template-desc">${t.description}</div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Failed to fetch templates:', err);
            }
        }
        
        function useTemplate(templateId) {
            document.getElementById('workflowInput').value = `Use template: ${templateId}`;
            addLog(`Selected template: ${templateId}`, 'info');
        }
        
        async function runWorkflow() {
            const input = document.getElementById('workflowInput').value.trim();
            if (!input) {
                addLog('Please enter a task description', 'warning');
                return;
            }
            
            const btn = document.getElementById('runBtn');
            btn.disabled = true;
            btn.textContent = 'Running...';
            
            addLog(`Starting workflow: ${input}`, 'info');
            
            try {
                const resp = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input }),
                });
                
                const result = await resp.json();
                
                if (result.error) {
                    addLog(`Error: ${result.error}`, 'error');
                } else {
                    addLog(`Workflow accepted: ${result.message}`, 'success');
                    if (result.agents_active) {
                        addLog(`${result.agents_active} agents active`, 'info');
                    }
                }
            } catch (err) {
                addLog(`Failed to run workflow: ${err.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Run Workflow';
            }
        }
        
        function addLog(message, type = 'info') {
            const logOutput = document.getElementById('logOutput');
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logOutput.appendChild(line);
            logOutput.scrollTop = logOutput.scrollHeight;
        }
        
        // Initial load
        fetchStatus();
        fetchTemplates();
        
        // Refresh status every 5 seconds
        setInterval(fetchStatus, 5000);
    </script>
</body>
</html>
