# Code Development Workflow
# 代码开发工作流

name: code-dev
description: "从需求到上线的完整开发流程"
version: "1.0"

agents:
  router:
    type: Router
    description: "接收功能需求"
  
  planner:
    type: Planner
    description: "拆解开发任务"
  
  code_worker:
    type: Worker
    description: "实现功能代码"
    capabilities: ["exec", "read/write", "web_search"]
  
  review_worker:
    type: Worker
    description: "代码审查、安全审计"
    capabilities: ["exec", "read"]
  
  doc_worker:
    type: Worker
    description: "生成技术文档"
    capabilities: ["read/write"]
  
  deploy_worker:
    type: Worker
    description: "CI/CD 部署"
    capabilities: ["exec"]

workflow:
  entry: router
  steps:
    - from: router
      condition: valid_requirement
      to: planner
    
    - from: planner
      condition: plan_created
      to: code_worker
    
    - from: code_worker
      condition: execution_complete
      to: review_worker
    
    - from: review_worker
      condition: approval_passed
      to: doc_worker
    
    - from: doc_worker
      condition: execution_complete
      to: deploy_worker
    
    - from: deploy_worker
      condition: execution_complete
      to: router

# 示例输入
example_input: |
  开发一个 RESTful API 端点：
  - 功能：用户数据查询
  - 路径：GET /api/users/{id}
  - 认证：JWT Token
  - 返回：用户基本信息 + 最近活动
  - 测试覆盖率：>80%
